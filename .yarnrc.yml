# langium (pulled in transitively by mermaid -> @mermaid-js/parser) imports
# vscode-jsonrpc, vscode-languageserver-protocol and vscode-languageserver-types
# without declaring them as dependencies (it relies on node_modules hoisting via
# vscode-languageserver). Under Yarn PnP's strict resolution this breaks the
# vite/rollup browser build of quoomb-web. Declare the missing deps here so the
# fix is tracked and reproducible on fresh/CI installs.
packageExtensions:
  "langium@*":
    dependencies:
      vscode-jsonrpc: "8.2.0"
      vscode-languageserver-protocol: "3.17.5"
      vscode-languageserver-types: "3.17.5"
